name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Unzip src folder
        run: |
          unzip app/src.zip -d app/
          rm app/src.zip

      - name: Fix Deprecated JCenter
        run: |
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle || true
          sed -i 's/jcenter()/mavenCentral()/g' app/build.gradle || true

      - name: Setup Specific Gradle 7.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.4'

      - name: Force Build APK Only
        run: gradle assembleDebug -x test -x lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
